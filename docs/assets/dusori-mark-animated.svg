<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 180" role="img" aria-labelledby="title desc">
  <title id="title">Dusori</title>
  <desc id="desc">An animated open ensō around a rangoli wheel, crossed by a vermilion katana.</desc>
  <style>
    .enso { animation: reveal .9s cubic-bezier(.16,1,.3,1) both; transform-origin: 32px 32px; }
    .wheel { animation: settle 1.2s .18s cubic-bezier(.16,1,.3,1) both; transform-origin: 32px 32px; }
    .blade { animation: enter .85s .34s cubic-bezier(.16,1,.3,1) both; }
    .name { animation: name-in .8s .55s ease-out both; }
    .ink { fill: #1a1511; }
    .paper { fill: #f7f1e8; }
    @keyframes reveal { from { opacity: 0; transform: rotate(-18deg) scale(.92); } }
    @keyframes settle { from { opacity: 0; transform: rotate(-52deg) scale(.55); } }
    @keyframes enter { from { opacity: 0; transform: translate(-22px, 22px); } }
    @keyframes name-in { from { opacity: 0; transform: translateX(-12px); } }
    @media (prefers-color-scheme: dark) {
      .ink { fill: #f7f1e8; }
      .paper { fill: #1a1511; }
    }
    @media (prefers-reduced-motion: reduce) {
      .enso, .wheel, .blade, .name { animation: none; }
    }
  </style>
