    <g class="wheel" fill="none" stroke="#c9862e" opacity=".9">
      <circle cx="32" cy="32" r="5.2" stroke-width=".34"/><circle cx="32" cy="32" r="1.9" stroke-width=".3"/>
      <path d="M32 26.8V37.2M26.8 32H37.2M28.32 28.32L35.68 35.68M35.68 28.32L28.32 35.68" stroke-width=".3"/>
      <path d="M36.4 32a2.2 2.2 0 0 1-1.29 3.11A2.2 2.2 0 0 1 32 36.4a2.2 2.2 0 0 1-3.11-1.29A2.2 2.2 0 0 1 27.6 32a2.2 2.2 0 0 1 1.29-3.11A2.2 2.2 0 0 1 32 27.6a2.2 2.2 0 0 1 3.11 1.29A2.2 2.2 0 0 1 36.4 32" stroke-width=".28"/>
      <circle cx="32" cy="32" r="6.8" stroke-width=".22" stroke-dasharray="1.1 2.3" opacity=".7"/><circle cx="32" cy="32" r="7.6" stroke-width=".16" opacity=".4"/>
    </g>
    <g class="blade" transform="translate(8.7 -6.8) rotate(142 32 32)">
      <path class="ink" d="M7.1 30.9h6.7v2.2H7.1Q5.75 32 7.1 30.9Z"/><path class="paper" d="m9.3 31.1.75.9-.75.9-.75-.9Zm2.4 0 .75.9-.75.9-.75-.9Z"/>
      <ellipse class="ink" cx="14.8" cy="32" rx="1.05" ry="3.35"/><path class="ink" d="M15.75 30.95h1.45v2.1h-1.45Z"/>
      <path fill="#cb4832" d="M17.2 30.95h38.7l2.3.35-2.7 1H17.2Z"/><path d="M18.3 31.55h34.9" fill="none" stroke="#f7f1e8" stroke-width=".5" stroke-linecap="round"/>
    </g>
  </g>
  <g class="name">
    <text class="ink" x="198" y="96" font-family="Georgia, 'Times New Roman', serif" font-size="72" font-weight="600" letter-spacing="-2">Dusori</text>
    <text x="202" y="126" fill="#c9862e" font-family="ui-monospace, monospace" font-size="13" letter-spacing="2.4">LOCAL-FIRST LEARNING</text>
  </g>
</svg>
